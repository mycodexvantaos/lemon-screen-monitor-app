#:schema node_modules/wrangler/config-schema.json
name = "lemon-screen-monitor-app"
compatibility_date = "2025-05-07"
compatibility_flags = ["nodejs_compat"]

# KV namespace binding（金鑰配對系統必需）
# 建立方式：wrangler kv:namespace create SCREEN_MONITOR_KV
[[kv_namespaces]]
binding = "SCREEN_MONITOR_KV"
id = "SCREEN_MONITOR_KV_NAMESPACE_ID"

# Environment variables
[vars]
APP_ENV = "production"
APP_NAME = "SentinelCore"
APP_VERSION = "3.0.0"
ALLOWED_ORIGINS = "https://autoecoops.io,https://www.autoecoops.io,https://app.autoecoops.io"

# Production environment
[env.production]
name = "lemon-screen-monitor-app"

# 自訂網域路由 — api.autoecoops.io
[[env.production.routes]]
pattern = "api.autoecoops.io/*"
custom_domain = true

[env.production.vars]
APP_ENV = "production"

# Staging environment
[env.staging]
name = "lemon-screen-monitor-app-staging"

[env.staging.vars]
APP_ENV = "staging"
