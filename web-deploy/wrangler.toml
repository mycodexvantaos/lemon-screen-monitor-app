#:schema node_modules/wrangler/config-schema.json
name = "lemon-screen-monitor-app"
compatibility_date = "2025-05-07"
compatibility_flags = ["nodejs_compat"]

# Pages project configuration
[site]
bucket = "."

# KV namespace binding (create with: wrangler kv:namespace create SCREEN_MONITOR_KV)
# [[kv_namespaces]]
# binding = "SCREEN_MONITOR_KV"
# id = "your-kv-namespace-id"

# Environment variables
[vars]
APP_ENV = "production"
APP_NAME = "ScreenMonitor"
APP_VERSION = "3.0.0"

# Production environment
[env.production]
name = "lemon-screen-monitor-app"

[env.production.vars]
APP_ENV = "production"

# Staging environment
[env.staging]
name = "lemon-screen-monitor-app-staging"

[env.staging.vars]
APP_ENV = "staging"
